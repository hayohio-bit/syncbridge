version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: syncbridge-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${DB_NAME:-syncbridge}
      MYSQL_USER: ${DB_USERNAME:-sbuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-3306}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always

volumes:
  mysql_data:
