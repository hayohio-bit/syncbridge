spring:
  application:
    name: syncbridge
  profiles:
    active: dev
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-3.5-turbo

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:syncbridge-dev-secret-key-2024-must-be-at-least-256-bits-long}
  expiration: 900000
  refresh-expiration-days: 7

file:
  upload-dir: ${FILE_UPLOAD_DIR:c:/syncbridge-uploads/}

---
# ─────────────────────────────────────────────────────────────
# [dev] 로컬 개발 환경 (H2 In-memory DB)
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:syncbridge;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key-for-local-test}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

---
# ─────────────────────────────────────────────────────────────
# [local-mysql] 로컬 MySQL 연동 개발 환경
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local-mysql
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:syncbridge}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:sbuser}
    password: ${DB_PASSWORD:3306}
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key-for-local-mysql}
